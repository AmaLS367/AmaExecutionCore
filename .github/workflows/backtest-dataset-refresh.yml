name: Backtest Dataset Refresh

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  ENVIRONMENT: ci
  DEBUG: "false"
  LOG_LEVEL: INFO
  DATABASE_URL: sqlite+aiosqlite:///tmp/amaexecutioncore-refresh.db
  TRADING_MODE: shadow
  BYBIT_TESTNET: "false"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Refresh regression datasets
        run: >-
          uv run python scripts/refresh_backtest_dataset.py
          --manifest scripts/fixtures/backtest_manifest.json
          --output-summary scripts/fixtures/regression/regression_dataset_refresh.json

      - name: Regenerate regression report
        run: >-
          uv run python scripts/backtest_gate.py
          --manifest scripts/fixtures/backtest_manifest.json
          --mode regression
          --output scripts/fixtures/regression/regression_report.json

      - name: Create refresh pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(backtest): refresh regression datasets"
          title: "chore(backtest): refresh regression datasets"
          body: |
            Automated monthly refresh of checked-in regression datasets and report artifacts.
          branch: chore/backtest-dataset-refresh
          delete-branch: true
