name: Backtest Regression

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  ENVIRONMENT: ci
  DEBUG: "false"
  LOG_LEVEL: INFO
  DATABASE_URL: sqlite+aiosqlite:///tmp/amaexecutioncore-regression.db
  TRADING_MODE: shadow
  BYBIT_TESTNET: "false"

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run deterministic regression gate
        run: >-
          uv run python scripts/backtest_gate.py
          --manifest scripts/fixtures/backtest_manifest.json
          --mode regression
          --output artifacts/backtest-regression.json

      - name: Upload regression artifact
        uses: actions/upload-artifact@v7
        with:
          name: backtest-regression
          path: artifacts/backtest-regression.json
