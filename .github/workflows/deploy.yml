name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  predeploy_live_backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      DATABASE_URL: sqlite+aiosqlite:///tmp/amaexecutioncore-predeploy.db
      TRADING_MODE: shadow
      BYBIT_TESTNET: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run predeploy live backtest gate
        run: >-
          uv run python scripts/backtest_gate.py
          --manifest scripts/fixtures/backtest_manifest.json
          --mode live
          --output artifacts/backtest-live-predeploy.json

      - name: Upload predeploy live backtest artifact
        uses: actions/upload-artifact@v7
        with:
          name: backtest-live-predeploy
          path: artifacts/backtest-live-predeploy.json

  deploy:
    needs: predeploy_live_backtest
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: ${{ secrets.VPS_PORT || '2222' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            TARGET_DIR="/opt/amaexecutioncore"

            echo "Starting deployment to $TARGET_DIR..."

            if [ ! -d "$TARGET_DIR/.git" ]; then
              echo "Expected $TARGET_DIR to be an existing git checkout."
              echo "Prepare the VPS once before enabling production deploys."
              exit 1
            fi

            cd "$TARGET_DIR"

            if [ ! -f .env ]; then
              echo "Missing $TARGET_DIR/.env. Refusing to deploy with default configuration."
              exit 1
            fi

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            echo "Rebuilding and restarting Docker containers..."
            docker compose up -d --build --remove-orphans

            echo "Checking application health..."
            for i in $(seq 1 15); do
              if curl --fail --silent --show-error http://127.0.0.1:8000/health; then
                echo "Health check passed."
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "Health check failed after 15 attempts. Bot logs:"
                docker logs ama_bot --tail 30
                exit 1
              fi
              echo "Attempt $i failed, retrying in 2s..."
              sleep 2
            done

            echo "Cleaning up dangling images..."
            docker image prune -f

            echo "Deployment successful."
