name: Docker

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare env file for compose validation
        run: cp .env.example .env

      - name: Validate Compose
        run: docker compose config

      - name: Build Image
        run: docker build -t amaexecutioncore-ci .
