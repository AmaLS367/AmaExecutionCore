name: Quality

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Import Rules
        run: uv run python scripts/import_rules.py
