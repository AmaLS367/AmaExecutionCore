name: Tests

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  DATABASE_URL: sqlite+aiosqlite:///tmp/amaexecutioncore-ci.db
  DEBUG: "true"
  BYBIT_TESTNET: "true"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Pytest
        run: uv run pytest

  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run Offline Backtest Smoke
        run: >-
          uv run python scripts/run_backtest.py
          --fixture scripts/fixtures/backtest_smoke.json
          --strategy ema_crossover
          --min-closed-trades 2
