services:
  bot:
    build: .
    container_name: ama_bot
    env_file:
      - .env
    environment:
      # Override DB URL to point to the postgres service
      DATABASE_URL: postgresql+asyncpg://appuser:${POSTGRES_PASSWORD:-tradingpass}@postgres:5432/tradingbot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    build: .
    container_name: ama_migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://appuser:${POSTGRES_PASSWORD:-tradingpass}@postgres:5432/tradingbot
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: no

  postgres:
    image: postgres:16-alpine
    container_name: ama_postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradingpass}
      POSTGRES_DB: tradingbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d tradingbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ama_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ama_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ama_frontend
    restart: unless-stopped

  ama_nginx:
    image: nginx:alpine
    container_name: ama_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - bot
      - ama_frontend
    command: /bin/sh -c "envsubst '$$DOMAIN_NAME $$ADMIN_WHITELIST_IP' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

volumes:
  postgres_data:
